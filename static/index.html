<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ShopBot – FAQ Assistant</title>
<style>
  /* ── Design tokens ──────────────────────────────────── */
  :root {
    --bg:        #0f1117;
    --surface:   #1a1d27;
    --surface2:  #22263a;
    --border:    #2e3350;
    --accent:    #6c63ff;
    --accent2:   #a78bfa;
    --bot-bg:    #1e2235;
    --user-bg:   #6c63ff;
    --text:      #e4e6f0;
    --muted:     #7b82a0;
    --tag-bg:    #252a40;
    --radius:    14px;
    --font-body: 'Inter', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Import fonts ───────────────────────────────────── */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  /* ── Top bar ────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .bot-avatar {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 16px rgba(108,99,255,.4);
  }
  .header-info h1 { font-size: 15px; font-weight: 600; }
  .header-info span { font-size: 12px; color: #4ade80; }
  .dot { display: inline-block; width: 7px; height: 7px; background: #4ade80;
         border-radius: 50%; margin-right: 5px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .header-actions {
    margin-left: auto;
    display: flex; gap: 8px;
  }
  .chip {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .chip:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }

  /* ── Category filter bar ────────────────────────────── */
  .cat-bar {
    display: flex; gap: 8px; padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: none;
  }
  .cat-bar::-webkit-scrollbar { display: none; }
  .cat-chip {
    padding: 5px 14px; border-radius: 20px;
    font-size: 12px; font-weight: 500;
    background: var(--tag-bg); border: 1px solid var(--border);
    color: var(--muted); cursor: pointer; transition: all .2s;
    white-space: nowrap; flex-shrink: 0;
  }
  .cat-chip.active, .cat-chip:hover {
    background: var(--accent); border-color: var(--accent);
    color: #fff;
  }

  /* ── Chat window ────────────────────────────────────── */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Message bubbles ─────────────────────────────────── */
  .msg-row {
    display: flex;
    gap: 10px;
    max-width: 780px;
    animation: fadeUp .25s ease;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:translateY(0) } }

  .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-row.bot  { align-self: flex-start; }

  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0; margin-top: 2px;
  }
  .avatar.user-av {
    background: linear-gradient(135deg, #e879f9, #a78bfa);
  }

  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    max-width: 100%;
    word-break: break-word;
  }
  .bot .bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }
  .user .bubble {
    background: var(--user-bg);
    border-top-right-radius: 4px;
    color: #fff;
  }

  /* ── Meta info under bot bubble ─────────────────────── */
  .meta {
    display: flex; align-items: center; gap: 8px;
    margin-top: 6px; flex-wrap: wrap;
  }
  .meta-tag {
    font-size: 11px; padding: 2px 8px;
    border-radius: 10px; background: var(--tag-bg);
    border: 1px solid var(--border); color: var(--muted);
  }
  .confidence-bar {
    height: 4px; border-radius: 4px;
    background: var(--border); width: 80px; overflow: hidden;
  }
  .confidence-fill {
    height: 100%; background: linear-gradient(90deg, #f59e0b, #4ade80);
    border-radius: 4px; transition: width .5s ease;
  }

  /* ── Typing indicator ────────────────────────────────── */
  .typing-dots span {
    display: inline-block; width: 7px; height: 7px;
    background: var(--muted); border-radius: 50%; margin: 0 2px;
    animation: blink 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

  /* ── Suggestion pills ────────────────────────────────── */
  .suggestions {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px;
  }
  .sug-pill {
    padding: 5px 12px; border-radius: 20px; font-size: 12px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--accent2); cursor: pointer; transition: all .2s;
  }
  .sug-pill:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── Input area ──────────────────────────────────────── */
  footer {
    padding: 14px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-row {
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    transition: border-color .2s;
  }
  .input-row:focus-within { border-color: var(--accent); }

  #userInput {
    flex: 1; border: none; outline: none;
    background: transparent; color: var(--text);
    font-family: var(--font-body); font-size: 14px;
    resize: none; max-height: 120px;
    scrollbar-width: thin;
    line-height: 1.5;
  }
  #userInput::placeholder { color: var(--muted); }

  #sendBtn {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--accent);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s; flex-shrink: 0;
    color: #fff;
  }
  #sendBtn:hover { background: var(--accent2); transform: scale(1.05); }
  #sendBtn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  .footer-hint { font-size: 11px; color: var(--muted); margin-top: 8px; text-align: center; }

  /* ── Welcome card ────────────────────────────────────── */
  .welcome {
    text-align: center; padding: 30px 20px; max-width: 480px;
    margin: auto;
  }
  .welcome .icon { font-size: 48px; margin-bottom: 12px; }
  .welcome h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .welcome p  { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .welcome-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 16px; }
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────── -->
<header>
  <div class="bot-avatar">🛍️</div>
  <div class="header-info">
    <h1>ShopBot</h1>
    <span><span class="dot"></span>Online · FAQ Assistant</span>
  </div>
  <div class="header-actions">
    <button class="chip" onclick="clearChat()">🗑 Clear</button>
    <button class="chip" onclick="showAllFAQs()">📋 All FAQs</button>
  </div>
</header>

<!-- ── Category filter ─────────────────────────────────── -->
<div class="cat-bar" id="catBar">
  <button class="cat-chip active" onclick="filterCat(this, null)">All</button>
</div>

<!-- ── Chat area ───────────────────────────────────────── -->
<div id="chat">
  <!-- welcome card injected by JS -->
</div>

<!-- ── Input ───────────────────────────────────────────── -->
<footer>
  <div class="input-row">
    <textarea id="userInput" rows="1" placeholder="Ask me anything about your order, account, or returns…"
              oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button id="sendBtn" onclick="sendMessage()" title="Send">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <p class="footer-hint">Powered by TF-IDF cosine similarity · NLP with NLTK</p>
</footer>

<script>
// ── State ──────────────────────────────────────────────────
let allFAQs = [];
let categories = [];
let activeCategory = null;

// ── Init ───────────────────────────────────────────────────
async function init() {
  await Promise.all([loadCategories(), loadFAQs()]);
  showWelcome();
}

async function loadCategories() {
  try {
    const r = await fetch('/api/categories');
    categories = await r.json();
    const bar = document.getElementById('catBar');
    categories.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'cat-chip';
      btn.textContent = c;
      btn.onclick = () => filterCat(btn, c);
      bar.appendChild(btn);
    });
  } catch(e) {}
}

async function loadFAQs() {
  try {
    const r = await fetch('/api/faqs');
    allFAQs = await r.json();
  } catch(e) {}
}

function filterCat(btn, cat) {
  activeCategory = cat;
  document.querySelectorAll('.cat-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── Welcome card ───────────────────────────────────────────
function showWelcome() {
  const chat = document.getElementById('chat');
  const suggestions = [
    'How do I track my order?',
    'What is the return policy?',
    'Payment methods accepted?',
    'How to reset password?',
    'Cancel my order',
  ];

  const pills = suggestions.map(s =>
    `<button class="sug-pill" onclick="quickSend('${s}')">${s}</button>`
  ).join('');

  chat.innerHTML = `
    <div class="welcome">
      <div class="icon">🛍️</div>
      <h2>Hi! I'm ShopBot</h2>
      <p>I can answer your questions about orders, shipping, returns, payments, and your account. Try one of these or type your own question.</p>
      <div class="welcome-chips">${pills}</div>
    </div>`;
}

// ── Messaging ──────────────────────────────────────────────
function quickSend(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;

  // Remove welcome card if present
  const welcome = document.querySelector('.welcome');
  if (welcome) welcome.closest('#chat').innerHTML = '';

  appendMessage('user', text);
  const typingId = appendTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const data = await res.json();
    removeTyping(typingId);
    appendBotMessage(data);
  } catch(e) {
    removeTyping(typingId);
    appendMessage('bot', '⚠️ Connection error. Make sure the Flask server is running on port 5000.');
  }

  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function appendMessage(role, text) {
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;
  const avatarEmoji = role === 'user' ? '👤' : '🛍️';
  const avatarClass = role === 'user' ? 'user-av' : '';
  row.innerHTML = `
    <div class="avatar ${avatarClass}">${avatarEmoji}</div>
    <div class="bubble">${escapeHtml(text)}</div>`;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function appendBotMessage(data) {
  const chat = document.getElementById('chat');
  const row = document.createElement('div');
  row.className = 'msg-row bot';

  const confPct = Math.round(data.confidence * 100);
  const metaHtml = data.matched ? `
    <div class="meta">
      <span class="meta-tag">📂 ${data.category}</span>
      <div class="confidence-bar">
        <div class="confidence-fill" style="width:${confPct}%"></div>
      </div>
      <span class="meta-tag">${confPct}% match</span>
    </div>` : '';

  // Suggest related questions (same category)
  let sugHtml = '';
  if (data.matched && data.category) {
    const related = allFAQs
      .filter(f => f.question !== data.question)
      .slice(0, 3);
    if (related.length) {
      const pills = related.map(f =>
        `<button class="sug-pill" onclick="quickSend('${escapeAttr(f.question)}')">${escapeHtml(f.question)}</button>`
      ).join('');
      sugHtml = `<div class="suggestions">${pills}</div>`;
    }
  }

  row.innerHTML = `
    <div class="avatar">🛍️</div>
    <div>
      <div class="bubble">${escapeHtml(data.answer)}</div>
      ${metaHtml}
      ${sugHtml}
    </div>`;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function appendTyping() {
  const chat = document.getElementById('chat');
  const id = 'typing-' + Date.now();
  const row = document.createElement('div');
  row.className = 'msg-row bot'; row.id = id;
  row.innerHTML = `
    <div class="avatar">🛍️</div>
    <div class="bubble typing-dots"><span></span><span></span><span></span></div>`;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return id;
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

// ── Clear / All FAQs ───────────────────────────────────────
function clearChat() {
  showWelcome();
}

function showAllFAQs() {
  const chat = document.getElementById('chat');
  const welcome = document.querySelector('.welcome');
  if (welcome) chat.innerHTML = '';

  const filtered = activeCategory
    ? allFAQs.filter(f => f.category === activeCategory)
    : allFAQs;

  const pills = filtered.map(f =>
    `<button class="sug-pill" onclick="quickSend('${escapeAttr(f.question)}')">${escapeHtml(f.question)}</button>`
  ).join('');

  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.innerHTML = `
    <div class="avatar">🛍️</div>
    <div>
      <div class="bubble">Here are all ${filtered.length} FAQs${activeCategory ? ` in <b>${activeCategory}</b>` : ''}. Click any to ask:</div>
      <div class="suggestions" style="margin-top:10px">${pills}</div>
    </div>`;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

// ── Utilities ──────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>');
}

function escapeAttr(s) {
  return String(s).replace(/'/g,"\\'");
}

init();
</script>
</body>
</html>
